services:
  # PostgreSQL Database
  db:
    image: postgres:17
    container_name: familyhub-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: familyhub
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - familyhub_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d familyhub"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Django Web Application
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: familyhub-web
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./FamilyHub:/app
      - ./standalone-apps:/standalone-apps
      - ./shared:/shared
    env_file:
      - .env.docker
    environment:
      - DEBUG=True
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/familyhub
      - DJANGO_SETTINGS_MODULE=FamilyHub.settings
      - PYTHONPATH=/app:/standalone-apps:/shared
      - ALLOWED_HOSTS=localhost,127.0.0.1,0.0.0.0
    depends_on:
      - db
    networks:
      - familyhub_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3

# Named Volumes
volumes:
  postgres_data:
    driver: local

# Networks
networks:
  familyhub_network:
    driver: bridge
